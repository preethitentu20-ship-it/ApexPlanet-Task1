<!DOCTYPE html>
<html>
<head>
    <title>Basic Website</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to My Webpage</h1>
    </header>

    <!-- Gallery Row -->
    <div class="gallery">
        <div class="site-block">
            <img src="images/google.png" alt="Google Homepage">
            <p><a href="https://www.google.com" target="_blank">Google</a></p>
        </div>

        <div class="site-block">
            <img src="images/youtube.png" alt="YouTube Homepage">
            <p><a href="https://www.youtube.com" target="_blank">YouTube</a></p>
        </div>

        <div class="site-block">
            <img src="images/instagram.png" alt="Instagram Homepage">
            <p><a href="https://www.instagram.com" target="_blank">Instagram</a></p>
        </div>
    </div>

    <p>This is a basic webpage using HTML, CSS, and JavaScript.</p>

    <button onclick="showAlert()">I visited your webpage</button>
</body>
</html>
